[tox]
requires =
    tox>=4.24
    tox-uv>=1.20
env_list = unit, integration, integration_v2, e2e, ui, coverage
skip_missing_interpreters = true

# ─── Base test environment ───────────────────────────────────────
[testenv]
runner = uv-venv-lock-runner
dependency_groups = dev
package = editable
pass_env =
    DATABASE_URL
    ADCP_SALES_PORT
    POSTGRES_PORT
    GEMINI_API_KEY
    ENCRYPTION_KEY
    ADCP_TESTING
    ADCP_AUTH_TEST_MODE
    CREATE_SAMPLE_DATA
    CREATE_DEMO_TENANT
    DELIVERY_WEBHOOK_INTERVAL
    COMPOSE_PROJECT_NAME
    SUPER_ADMIN_EMAILS
    GOOGLE_CLIENT_ID
    GOOGLE_CLIENT_SECRET
    PYTEST_CURRENT_TEST
setenv =
    COVERAGE_FILE = {toxworkdir}/.coverage.{envname}

# ─── Unit tests (DATABASE_URL must be UNSET) ────────────────────
[testenv:unit]
description = Unit tests (no database, no server)
setenv =
    COVERAGE_FILE = {toxworkdir}/.coverage.{envname}
    DATABASE_URL =
commands =
    pytest tests/unit/ \
        --cov=src --cov-report= \
        --json-report --json-report-file={toxworkdir}/unit.json --json-report-indent=2 \
        -q --tb=line {posargs}

# ─── Integration tests ──────────────────────────────────────────
[testenv:integration]
description = Integration tests (needs PostgreSQL)
commands =
    pytest tests/integration/ \
        -m "not requires_server and not skip_ci" \
        --cov=src --cov-report= \
        --json-report --json-report-file={toxworkdir}/integration.json --json-report-indent=2 \
        -q --tb=line {posargs}

# ─── Integration V2 tests ───────────────────────────────────────
[testenv:integration_v2]
description = Integration V2 tests (needs PostgreSQL)
commands =
    pytest tests/integration_v2/ \
        -m "not requires_server and not skip_ci" \
        --cov=src --cov-report= \
        --json-report --json-report-file={toxworkdir}/integration_v2.json --json-report-indent=2 \
        -q --tb=line {posargs}

# ─── E2E tests ──────────────────────────────────────────────────
[testenv:e2e]
description = End-to-end tests (needs full Docker stack)
commands =
    pytest tests/e2e/ \
        --cov=src --cov-report= \
        --json-report --json-report-file={toxworkdir}/e2e.json --json-report-indent=2 \
        -q --tb=line {posargs}

# ─── UI tests ───────────────────────────────────────────────────
[testenv:ui]
description = UI tests (needs full Docker stack)
commands =
    pytest tests/ui/ \
        -m "not requires_server and not slow" \
        --cov=src --cov-report= \
        --json-report --json-report-file={toxworkdir}/ui.json --json-report-indent=2 \
        -q --tb=line {posargs}

# ─── Coverage combine + report ──────────────────────────────────
[testenv:coverage]
description = Combine coverage from all suites and generate reports
skip_install = true
deps = coverage[toml]
depends = unit, integration, integration_v2, e2e, ui
parallel_show_output = true
setenv =
    COVERAGE_FILE = {toxworkdir}/.coverage
commands =
    coverage combine {toxworkdir}
    coverage report --fail-under=30
    coverage html -d {toxinidir}/htmlcov
    coverage json -o {toxinidir}/coverage.json
