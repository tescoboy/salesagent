{% extends "base.html" %}

{% block title %}{{ error_title or "Error" }}{% endblock %}

{% block content %}
<div class="sa-error-page">
    <div class="sa-card sa-error-card">
        <h2 class="sa-error-title">{{ error_title or "Error" }}</h2>
        <p class="sa-error-message">{{ error_message or "An error occurred." }}</p>
        {% if back_url %}
        <a href="{{ back_url }}" class="btn btn-primary">← Go Back</a>
        {% else %}
        <a href="/" class="btn btn-primary">← Go Home</a>
        {% endif %}
    </div>
</div>
{% endblock %}
