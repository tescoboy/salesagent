          - type: 'null'
          default: null
          title: Video Placement Types
        wholesale_product_id:
          maxLength: 100
          minLength: 1
          title: Wholesale Product Id
          type: string
      required:
      - wholesale_product_id
      - name
      - inventory
      - product_id
      title: WholesaleProductResponse
      type: object
    WholesaleProductResponse.f44f287.FormatIdRef:
      additionalProperties: false
