        \ per-principal tokens (see sprint 2 \xA7 Auth boundary). No\n``api_token``\
        \ field is emitted here."
      properties:
        name:
          title: Name
          type: string
        principal_id:
          title: Principal Id
          type: string
      required:
      - principal_id
      - name
      title: ProvisionedPrincipalResponse
      type: object
    RefreshResponse.f44f287:
      additionalProperties: false
      description: "``POST /tenants/{tid}/refresh`` response \u2014 fan-out of sync\
        \ run ids.\n\nStorefront polls ``GET /status.syncs`` for progress per sync\
        \ type.\nRe-POST within 60 seconds returns the SAME ids (idempotent \u2014\
        \ avoids\nhammering GAM when a publisher mashes the button)."
      properties:
        started_at:
          format: date-time
          title: Started At
          type: string
        sync_run_ids:
          additionalProperties:
            type: string
          title: Sync Run Ids
          type: object
      required:
      - started_at
      title: RefreshResponse
      type: object
