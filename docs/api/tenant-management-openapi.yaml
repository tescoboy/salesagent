    TestConnectionResponse.f44f287:
      additionalProperties: false
      description: "Result of an adapter connection probe.\n\n``error_code`` classifies\
        \ the fault into a closed set of typed values\nso the UI can branch without\
        \ parsing the human-readable ``error``.\nThe same code appears as the suffix\
        \ of the ``adapter_{code}`` error\nin :class:`ApiError` envelopes from the\
        \ provision / PUT paths. See\n:mod:`src.admin.services.adapter_connection_tester`.\n\
        \n``remediation`` (when populated) tells the UI WHO can fix the problem\n\u2014\
        \ useful for ``permission_denied`` (vendor enables a role vs customer\nrebinds\
        \ the account) where the error code alone isn't actionable."
      properties:
        capability_checks:
          items:
            $ref: '#/components/schemas/TestConnectionResponse.f44f287.AdapterCapabilityCheck'
          title: Capability Checks
          type: array
        details:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          default: null
          title: Details
        error:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Error
        error_code:
          anyOf:
          - enum:
            - network_not_found
            - permission_denied
            - invalid_credentials
            - invalid_config
            - upstream_unavailable
            - connection_failed
            type: string
          - type: 'null'
          default: null
          title: Error Code
        remediation:
          anyOf:
          - enum:
            - vendor_enables_role
            - customer_rebinds_account
            - customer_rotates_token
            type: string
          - type: 'null'
          default: null
          title: Remediation
        success:
          title: Success
          type: boolean
        tested_at:
          format: date-time
          title: Tested At
          type: string
      required:
      - success
      - tested_at
      title: TestConnectionResponse
      type: object
    TestConnectionResponse.f44f287.AdapterCapabilityCheck:
      additionalProperties: false
      description: 'One capability check result returned by adapter probes.


        ``test-connection`` stays non-mutating, so write capabilities that require

        a live mutation should be reported as ``not_checked`` rather than inferred

        from successful authentication.'
      properties:
        capability:
          maxLength: 128
          minLength: 1
          title: Capability
          type: string
        details:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          default: null
          title: Details
        error_code:
          anyOf:
          - enum:
            - network_not_found
            - permission_denied
            - invalid_credentials
            - invalid_config
            - upstream_unavailable
            - connection_failed
            type: string
          - type: 'null'
          default: null
          title: Error Code
        message:
          anyOf:
          - maxLength: 500
            type: string
          - type: 'null'
          default: null
          title: Message
        remediation:
          anyOf:
          - enum:
            - vendor_enables_role
            - customer_rebinds_account
            - customer_rotates_token
            type: string
          - type: 'null'
          default: null
          title: Remediation
        status:
          enum:
          - passed
          - failed
          - not_checked
          title: Status
          type: string
      required:
      - capability
      - status
      title: AdapterCapabilityCheck
      type: object
