          - type: 'null'
          default: null
          title: Billing Plan
        contact_email:
          anyOf:
          - format: email
            type: string
          - type: 'null'
          default: null
          title: Contact Email
        default_gam_advertiser_id:
          anyOf:
          - maxLength: 64
            minLength: 1
            type: string
          - type: 'null'
          default: null
          title: Default Gam Advertiser Id
        embed_breadcrumb_root:
          anyOf:
          - $ref: '#/components/schemas/UpdateTenantRequest.f44f287.EmbedBreadcrumbRoot'
          - type: 'null'
          default: null
        house_domain:
          anyOf:
          - maxLength: 255
            minLength: 1
            type: string
          - type: 'null'
          default: null
          title: House Domain
        name:
          anyOf:
          - maxLength: 255
            minLength: 1
            type: string
          - type: 'null'
          default: null
          title: Name
        public_agent_url:
          anyOf:
          - maxLength: 500
            minLength: 1
            type: string
          - type: 'null'
          default: null
          title: Public Agent Url
      title: UpdateTenantRequest
      type: object
    UpdateTenantRequest.f44f287.EmbedBreadcrumbRoot:
      additionalProperties: false
      description: 'First-crumb override for embedded-mode admin pages.


        When the upstream host renders the salesagent admin UI inside its own

        chrome (``tenant.is_embedded=True``), the first breadcrumb crumb should

        point back to the host''s storefront homepage rather than the

        salesagent''s tenant dashboard. ``label`` is the visible link text;

        ``url`` is the absolute HTTPS link the host wants the user dropped at.


        Validated at schema boundary so bad input never reaches the rendered

        template; the same model also gates the per-request

        ``X-Embed-Breadcrumb-Root`` header value (see

        :func:`src.admin.utils.breadcrumbs.resolve_embed_breadcrumb_root`).'
      properties:
        label:
          maxLength: 120
          minLength: 1
          title: Label
          type: string
        url:
          maxLength: 500
          minLength: 1
          title: Url
          type: string
      required:
      - label
      - url
      title: EmbedBreadcrumbRoot
      type: object
    ValidationError.6a07bef:
