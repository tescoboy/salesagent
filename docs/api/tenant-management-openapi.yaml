    ListGamAdvertisersResponse.f44f287:
      additionalProperties: false
      description: "``GET /tenants/{tid}/gam/advertisers`` response.\n\nCursor pagination\
        \ with opaque base64-encoded offset (same shape as\nother list endpoints \u2014\
        \ Storefront treats it as a sealed token).\n\n``synced_at`` reports the most-recent\
        \ ``gam_advertisers.synced_at``\nfor the tenant so the picker can show \"\
        Last synced 5 minutes ago\".\nNULL when no advertisers have ever synced."
