          title: Creative Formats
          type: array
        execution:
          $ref: '#/components/schemas/WholesaleProductResponse.f44f287.WholesaleInventoryExecution'
        publisher_properties:
          items:
            $ref: '#/components/schemas/WholesaleProductResponse.f44f287.PublisherPropertySelector'
