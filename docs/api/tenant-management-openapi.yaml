    RefreshConflictResponse.f44f287:
      additionalProperties: false
      description: "``POST /tenants/{tid}/refresh`` response (HTTP 409) \u2014 sync\
        \ already running.\n\nMirrors the 202 :class:`RefreshResponse` shape (``sync_run_ids``\
        \ +\n``started_at`` at the top level so receivers don't need a second\nparse\
