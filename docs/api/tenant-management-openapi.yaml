          anyOf:
          - maxLength: 512
            type: string
          - type: 'null'
          default: null
          title: Name
        options:
          additionalProperties: true
          title: Options
          type: object
        selector_type:
          maxLength: 64
          minLength: 1
          title: Selector Type
          type: string
      required:
      - selector_type
