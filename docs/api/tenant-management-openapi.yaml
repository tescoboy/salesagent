        \ (sprint 1.8 doc \xA72:   a brand-level rule must be scoped to a parent house).\
        \ - 409 on duplicate ``(operator_domain, brand_house, brand_id)`` tuple  \
        \ (NULLs participate in uniqueness via COALESCE in the unique index).\n\n\
        Validation: ``gam_advertiser_id`` must reference a row in this tenant's synced\
        \ ``gam_advertisers`` cache (Sprint 5 piece D \u2014 the deferred Sprint 1.8\
        \ validator finally lands here).\n\nGraceful degradation: if the cache is\
        \ empty (sync hasn't run yet \u2014 new tenant, GAM not connected, etc.) we\
        \ skip the check and accept the id. This avoids breaking the rule-creation\
        \ flow during onboarding before the first sync completes."
