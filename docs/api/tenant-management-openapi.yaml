        products:
          $ref: '#/components/schemas/TenantStatusResponse.f44f287.StatusProductsBlock'
        setup_tasks:
          $ref: '#/components/schemas/TenantStatusResponse.f44f287.SetupTasksBlock'
        syncs:
          $ref: '#/components/schemas/TenantStatusResponse.f44f287.StatusSyncsBlock'
        webhooks:
          anyOf:
          - $ref: '#/components/schemas/TenantStatusResponse.f44f287.StatusWebhooksBlock'
          - type: 'null'
          default: null
        workflows:
          $ref: '#/components/schemas/TenantStatusResponse.f44f287.StatusWorkflowsBlock'
      required:
      - adapter
      - fetched_at
      title: TenantStatusResponse
      type: object
    TenantStatusResponse.f44f287.SetupTaskItem:
      additionalProperties: false
      description: "One configuration-completeness item in the status setup_tasks\
        \ block.\n\nSeverity drives Storefront UI urgency; scope drives routing \u2014\
        \ Scope3\nescalates ``platform`` items internally (it's the host's job to\n\
        finish provisioning), while ``publisher`` items deep-link into the\niframe\
        \ at the matching Settings tab."
      properties:
        configure_path:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Configure Path
        description:
          title: Description
          type: string
        id:
          title: Id
          type: string
        is_complete:
          title: Is Complete
          type: boolean
        name:
          title: Name
          type: string
        scope:
          enum:
          - platform
          - publisher
          title: Scope
          type: string
        severity:
          enum:
          - blocker
          - warning
          - info
          title: Severity
          type: string
      required:
      - id
      - name
      - severity
      - scope
      - description
      - is_complete
      title: SetupTaskItem
      type: object
    TenantStatusResponse.f44f287.SetupTasksBlock:
      additionalProperties: false
      description: "Configuration-completeness rollup for ``GET /tenants/{tid}/status``.\n\
        \nReplaces the separate ``setup_checklist`` round-trip \u2014 Storefront\n\
        renders the homepage checklist directly off this block."
      properties:
        blocker_count:
          default: 0
          title: Blocker Count
          type: integer
        items:
          items:
            $ref: '#/components/schemas/TenantStatusResponse.f44f287.SetupTaskItem'
          title: Items
          type: array
        warning_count:
          default: 0
