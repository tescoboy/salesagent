      type: object
    WholesaleProductResponse.f44f287.WholesaleInventoryExecution:
      additionalProperties: false
      description: Adapter execution section of a wholesale product.
      properties:
        adapter:
          maxLength: 64
          minLength: 1
          title: Adapter
          type: string
        format_bindings:
          items:
            $ref: '#/components/schemas/WholesaleProductResponse.f44f287.WholesaleFormatBinding'
          title: Format Bindings
