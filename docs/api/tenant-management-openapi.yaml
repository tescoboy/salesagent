          - items:
              type: string
            type: array
          - type: 'null'
          default: null
          title: Allowed Actions
        allowed_principal_ids:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          default: null
          title: Allowed Principal Ids
        channels:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          default: null
          title: Channels
        created_at:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          default: null
          title: Created At
        delivery_type:
          default: non_guaranteed
          maxLength: 50
          minLength: 1
          title: Delivery Type
          type: string
        description:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Description
        forecast:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          default: null
          description: System-owned forecast metadata populated by Sales Agent syncs
            when available.
          title: Forecast
        format_options:
          anyOf:
          - items:
              additionalProperties: true
              type: object
            type: array
          - type: 'null'
          default: null
          title: Format Options
        inventory:
          $ref: '#/components/schemas/WholesaleProductResponse.f44f287.WholesaleInventory'
        inventory_profile_id:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Inventory Profile Id
        name:
          maxLength: 200
          minLength: 1
          title: Name
          type: string
        optimization_capabilities:
          additionalProperties: true
          title: Optimization Capabilities
          type: object
        pricing_options:
          items:
            $ref: '#/components/schemas/WholesaleProductResponse.f44f287.WholesalePricingOptionResponse'
          title: Pricing Options
          type: array
        product_id:
          maxLength: 100
          minLength: 1
          title: Product Id
          type: string
        status:
