          title: Success
          type: boolean
        tested_at:
          format: date-time
          title: Tested At
          type: string
      required:
      - success
      - tested_at
      title: TestConnectionResponse
      type: object
    UpdateBuyerAdvertiserMappingRequest.f44f287:
      additionalProperties: false
      description: "``PATCH /tenants/{tid}/buyer-advertiser-mappings/{mid}`` body.\n\
        \n``operator_domain`` is intentionally absent \u2014 changing it requires\n\
        DELETE + POST so the natural-key uniqueness constraint can't be\nsilently\
