      description: "One distinct ``(operator, brand_house, brand_id)`` triple seen\
        \ in\nrecent traffic, with the GAM advertiser it resolved to and how.\n\n\
        Powers Storefront's \"buyer routing\" widget \u2014 publishers can see at\
        \ a\nglance which buyers are landing on the default advertiser\n(``resolved_via=default``)\
        \ and might want their own bucket, vs.\nwhich already match a specific routing\
        \ rule."
      properties:
        brand_house:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Brand House
        brand_id:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Brand Id
        last_seen_at:
          format: date-time
          title: Last Seen At
          type: string
        operator_domain:
          title: Operator Domain
          type: string
        request_count:
          title: Request Count
          type: integer
        resolved_gam_advertiser_id:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Resolved Gam Advertiser Id
        resolved_via:
          title: Resolved Via
          type: string
      required:
