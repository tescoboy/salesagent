        selectors:
          items:
            $ref: '#/components/schemas/WholesaleProductResponse.f44f287.InventoryExecutionSelector'
          title: Selectors
          type: array
      required:
      - adapter
      title: WholesaleInventoryExecution
      type: object
    WholesaleProductResponse.f44f287.WholesalePricingOptionResponse:
      additionalProperties: false
      description: One pricing option returned to embedder clients.
      properties:
        currency:
          default: USD
          maxLength: 3
          minLength: 3
          title: Currency
          type: string
        is_fixed:
          default: true
          title: Is Fixed
          type: boolean
        min_spend_per_package:
          anyOf:
          - pattern: ^(?!^[-+.]*$)[+-]?0*\d*\.?\d*$
            type: string
          - type: 'null'
          default: null
          title: Min Spend Per Package
        parameters:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          default: null
          title: Parameters
        price_guidance:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          default: null
          title: Price Guidance
        pricing_model:
          maxLength: 32
          minLength: 1
          title: Pricing Model
          type: string
        pricing_option_id:
          maxLength: 128
          minLength: 1
          title: Pricing Option Id
          type: string
        rate:
          anyOf:
          - pattern: ^(?!^[-+.]*$)[+-]?0*\d*\.?\d*$
            type: string
          - type: 'null'
          default: null
          title: Rate
      required:
      - pricing_option_id
      - pricing_model
      title: WholesalePricingOptionResponse
      type: object
    WholesaleProductResponse.f44f287.WholesaleSlotRequirement:
      additionalProperties: false
      description: Optional slot-level requirements for multi-asset formats.
      properties:
        asset_type:
          anyOf:
          - maxLength: 64
            type: string
          - type: 'null'
          default: null
          title: Asset Type
        duration_ms:
          anyOf:
          - minimum: 1
            type: integer
          - type: 'null'
          default: null
          title: Duration Ms
        height:
          anyOf:
          - minimum: 1
            type: integer
          - type: 'null'
          default: null
          title: Height
        name:
          anyOf:
          - maxLength: 255
            type: string
          - type: 'null'
          default: null
          title: Name
        required:
          default: true
          title: Required
          type: boolean
        requirements:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          default: null
          title: Requirements
        slot_id:
          maxLength: 128
          minLength: 1
          title: Slot Id
          type: string
        width:
          anyOf:
          - minimum: 1
            type: integer
          - type: 'null'
          default: null
          title: Width
      required:
      - slot_id
      title: WholesaleSlotRequirement
      type: object
    WholesaleProductValidationResponse.f44f287:
      additionalProperties: false
      description: Validation result for wholesale-product authoring.
      properties:
        issues:
          items:
            $ref: '#/components/schemas/WholesaleProductValidationResponse.f44f287.WholesaleValidationIssue'
          title: Issues
          type: array
        valid:
          title: Valid
          type: boolean
      required:
      - valid
      title: WholesaleProductValidationResponse
      type: object
    WholesaleProductValidationResponse.f44f287.WholesaleValidationIssue:
      additionalProperties: false
      description: One validation issue for a wholesale-product draft.
      properties:
        code:
          title: Code
          type: string
        field:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Field
        message:
          title: Message
          type: string
        severity:
          default: error
          enum:
          - error
          - warning
          title: Severity
          type: string
      required:
      - code
      - message
      title: WholesaleValidationIssue
      type: object
    WorkflowDetail.f44f287:
      additionalProperties: false
      description: 'Full workflow detail. Adds description, full request context,
        and

        the decisions audit trail.'
      properties:
        context:
          additionalProperties: true
          title: Context
          type: object
        created_at:
          format: date-time
          title: Created At
          type: string
        decisions:
          items:
            $ref: '#/components/schemas/WorkflowDetail.f44f287.WorkflowDecision'
          title: Decisions
          type: array
        description:
          default: ''
          title: Description
          type: string
        expires_at:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          default: null
          title: Expires At
        requested_by_principal_id:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Requested By Principal Id
        requested_by_principal_name:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Requested By Principal Name
        status:
          enum:
          - pending
          - approved
          - rejected
          - cancelled
          - expired
          title: Status
          type: string
        subject_id:
          title: Subject Id
          type: string
        subject_type:
          title: Subject Type
          type: string
        updated_at:
          format: date-time
          title: Updated At
          type: string
        workflow_id:
          title: Workflow Id
          type: string
        workflow_type:
          title: Workflow Type
          type: string
      required:
      - workflow_id
      - workflow_type
      - status
      - subject_type
      - subject_id
      - created_at
      - updated_at
      title: WorkflowDetail
      type: object
    WorkflowDetail.f44f287.WorkflowDecision:
      additionalProperties: false
      description: One approve/reject event recorded against a workflow.
      properties:
        decided_at:
          format: date-time
          title: Decided At
          type: string
        decided_by_email:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Decided By Email
        decided_by_source:
          title: Decided By Source
          type: string
        decision:
          enum:
          - approve
          - reject
          title: Decision
          type: string
        notes:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Notes
      required:
      - decided_at
      - decision
      - decided_by_source
      title: WorkflowDecision
      type: object
  securitySchemes:
    TenantManagementApiKey:
      in: header
      name: X-Tenant-Management-API-Key
      type: apiKey
info:
  title: "Sales Agent \u2014 Tenant Management API"
  version: v1
openapi: 3.1.0
paths:
  /api/v1/tenant-management/adapters:
    get:
      description: "Embedder clients (Scope3 storefront, etc.) call this to discover\
        \ what adapters this Sales Agent instance supports. Returns one entry per\
        \ adapter type that has a typed AdapterConfig member \u2014 covering the full\
        \ set surfaced to operators in the tenant settings UI.\n\nEach entry carries:\
        \   - ``type`` \u2014 the value that goes into ``AdapterConfig.type``   -\
        \ ``name`` / ``description`` \u2014 human-readable display strings   - ``tier``\
        \ \u2014 ``\"live\"`` for production adapters, ``\"test\"`` for     simulated/dev-only\
        \ adapters (Mock). Embedders should filter     ``tier=\"test\"`` out of production\
        \ pickers.   - ``default_channels`` \u2014 channels this adapter is primarily\
        \ used for   - ``capabilities`` \u2014 static AdapterCapabilities flags  \
        \ - ``connection_schema`` \u2014 JSON Schema for the typed connection payload\n\
        \nOptional query params:   - ``tier=live`` to return only production-grade\
        \ adapters (omit     Mock). Useful for production storefronts that should\
        \ never offer     a simulated picker option."
      operationId: get__api_v1_tenant-management_adapters
      parameters: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAdaptersResponse.f44f287'
          description: OK
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError.6a07bef'
          description: Unprocessable Content
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError.f44f287'
          description: Internal Server Error
      summary: Return the full catalog of supported ad-server adapter types.
      tags: []
  /api/v1/tenant-management/adapters/broadstreet/config-schema:
    get:
      description: ''
      operationId: get__api_v1_tenant-management_adapters_broadstreet_config-schema
      parameters: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdapterSettingsSchemaResponse.f44f287'
          description: OK
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError.6a07bef'
          description: Unprocessable Content
      summary: Return the Broadstreet runtime settings schema and supported naming
        macros.
      tags: []
  /api/v1/tenant-management/adapters/freewheel/config-schema:
    get:
      description: ''
      operationId: get__api_v1_tenant-management_adapters_freewheel_config-schema
      parameters: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdapterSettingsSchemaResponse.f44f287'
          description: OK
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError.6a07bef'
          description: Unprocessable Content
      summary: Return the FreeWheel runtime settings schema.
      tags: []
  /api/v1/tenant-management/adapters/gam/config-schema:
    get:
      description: ''
      operationId: get__api_v1_tenant-management_adapters_gam_config-schema
      parameters: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdapterSettingsSchemaResponse.f44f287'
          description: OK
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError.6a07bef'
          description: Unprocessable Content
      summary: Return the GAM runtime settings schema and supported naming macros.
      tags: []
  /api/v1/tenant-management/adapters/google_ad_manager/config-schema:
    get:
      description: ''
      operationId: get__api_v1_tenant-management_adapters_google_ad_manager_config-schema
      parameters: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdapterSettingsSchemaResponse.f44f287'
          description: OK
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError.6a07bef'
          description: Unprocessable Content
      summary: Return the GAM runtime settings schema and supported naming macros.
      tags: []
  /api/v1/tenant-management/adapters/springserve/config-schema:
    get:
      description: ''
      operationId: get__api_v1_tenant-management_adapters_springserve_config-schema
      parameters: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdapterSettingsSchemaResponse.f44f287'
          description: OK
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError.6a07bef'
          description: Unprocessable Content
      summary: Return the SpringServe runtime settings schema.
      tags: []
  /api/v1/tenant-management/adapters/{adapter_type}/capabilities:
    get:
      description: ''
      operationId: get__api_v1_tenant-management_adapters_{adapter_type}_capabilities
      parameters:
      - description: ''
        in: path
        name: adapter_type
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdapterCapabilitiesResponse.f44f287'
          description: OK
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError.f44f287'
          description: Not Found
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError.6a07bef'
          description: Unprocessable Content
      summary: Return the detailed tenant-management contract capabilities for one
        adapter.
      tags: []
  /api/v1/tenant-management/health:
    get:
      description: ''
      operationId: get__api_v1_tenant-management_health
      parameters: []
      responses: {}
      summary: Health check endpoint for the tenant management API.
      tags: []
  /api/v1/tenant-management/tenants:
    get:
      description: ''
      operationId: get__api_v1_tenant-management_tenants
      parameters: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListTenantsResponse.f44f287'
          description: OK
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError.6a07bef'
          description: Unprocessable Content
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError.f44f287'
          description: Internal Server Error
      summary: 'List tenants. Optional query params: ``is_embedded`` (or deprecated
        ``managed_externally``), ``is_active``, ``external_source``.'
      tags: []
    post:
      description: ''
      operationId: post__api_v1_tenant-management_tenants
      parameters: []
      responses: {}
      summary: Create a new tenant.
      tags: []
  /api/v1/tenant-management/tenants/preview-adapter:
    post:
      description: "Lets the Storefront UI confirm an adapter grant + auto-fill currency\
        \ and timezone before committing to a tenant. Bad creds return 200 with ``ok=false``\
        \ (renders inline) \u2014 only malformed bodies / missing API key surface\
        \ as 4xx via the normal middleware path."
      operationId: post__api_v1_tenant-management_tenants_preview-adapter
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreviewAdapterRequest.f44f287'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreviewAdapterResponse.f44f287'
          description: OK
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError.6a07bef'
          description: Unprocessable Content
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError.f44f287'
          description: Internal Server Error
      summary: "Probe an adapter and return network metadata \u2014 no persistence."
      tags: []
  /api/v1/tenant-management/tenants/provision:
    post:
      description: ''
      operationId: post__api_v1_tenant-management_tenants_provision
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProvisionTenantRequest.f44f287'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProvisionTenantResponse.f44f287'
          description: Created
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError.f44f287'
          description: Bad Request
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError.f44f287'
          description: Conflict
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError.6a07bef'
          description: Unprocessable Content
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError.f44f287'
          description: Internal Server Error
      summary: Provision a managed tenant (one-shot create + adapter + currency +
        property tag + optional principal).
      tags: []
  /api/v1/tenant-management/tenants/{tenant_id}:
    delete:
      description: Returns 409 ``tenant_has_active_resources`` if the tenant has any
        active media buys.
      operationId: delete__api_v1_tenant-management_tenants_{tenant_id}
      parameters:
      - description: ''
        in: path
        name: tenant_id
        required: true
