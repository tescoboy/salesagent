components:
  schemas:
    AccountDetail.f44f287:
      additionalProperties: false
      description: Full account view returned from POST/GET-by-id.
      properties:
        account_id:
          title: Account Id
          type: string
        advertiser_mapped:
          title: Advertiser Mapped
          type: boolean
        billing:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Billing
        brand:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          default: null
          title: Brand
        buyer_agent_principal_id:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Buyer Agent Principal Id
        created_at:
          format: date-time
          title: Created At
          type: string
        gam_advertiser_id:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Gam Advertiser Id
        gam_advertiser_name:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Gam Advertiser Name
        name:
          title: Name
          type: string
        operator:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Operator
        payment_terms:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Payment Terms
        rate_card:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Rate Card
        sandbox:
          anyOf:
          - type: boolean
          - type: 'null'
          default: null
          title: Sandbox
        status:
          title: Status
          type: string
        updated_at:
          format: date-time
          title: Updated At
          type: string
      required:
      - account_id
      - name
      - status
      - advertiser_mapped
      - created_at
      - updated_at
      title: AccountDetail
      type: object
    AdapterCapabilitiesResponse.f44f287:
      additionalProperties: false
      description: Full response from ``GET /adapters/{adapter_type}/capabilities``.
      properties:
        contract_version:
          description: Version of this adapter's tenant-management contract.
          title: Contract Version
          type: string
        inventory_entity_label:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Inventory Entity Label
        reporting_bundled_with_inventory:
          default: false
          title: Reporting Bundled With Inventory
          type: boolean
        supported_object_types:
          items:
            type: string
          title: Supported Object Types
          type: array
        supported_pricing_models:
          items:
            type: string
          title: Supported Pricing Models
          type: array
        supported_signal_types:
          items:
            type: string
          title: Supported Signal Types
          type: array
        supports_audiences:
          default: false
          title: Supports Audiences
          type: boolean
        supports_custom_targeting:
          default: false
          title: Supports Custom Targeting
          type: boolean
        supports_dynamic_products:
          default: false
          title: Supports Dynamic Products
          type: boolean
        supports_forecasting:
          default: false
          title: Supports Forecasting
          type: boolean
        supports_geo_targeting:
          default: false
          title: Supports Geo Targeting
          type: boolean
        supports_inventory_configuration_authoring:
          default: false
          title: Supports Inventory Configuration Authoring
          type: boolean
        supports_inventory_profiles:
          default: false
          title: Supports Inventory Profiles
          type: boolean
        supports_inventory_sync:
          default: false
          title: Supports Inventory Sync
          type: boolean
        supports_materialization_preview:
          default: false
          title: Supports Materialization Preview
          type: boolean
        supports_pricing_recommendations:
          default: false
          title: Supports Pricing Recommendations
          type: boolean
        supports_realtime_reporting:
          default: false
          title: Supports Realtime Reporting
          type: boolean
        supports_reporting:
          default: false
          title: Supports Reporting
          type: boolean
        supports_reporting_sync:
          default: false
          title: Supports Reporting Sync
          type: boolean
        supports_signal_mapping_authoring:
          default: false
          title: Supports Signal Mapping Authoring
          type: boolean
        supports_webhooks:
          default: false
          title: Supports Webhooks
          type: boolean
        sync_streams:
          items:
            type: string
          title: Sync Streams
          type: array
        type:
          description: Adapter type identifier.
          title: Type
          type: string
        unsupported_features:
          items:
            $ref: '#/components/schemas/AdapterCapabilitiesResponse.f44f287.AdapterUnsupportedFeature'
          title: Unsupported Features
          type: array
      required:
      - type
      - contract_version
      title: AdapterCapabilitiesResponse
      type: object
    AdapterCapabilitiesResponse.f44f287.AdapterUnsupportedFeature:
      additionalProperties: false
      description: Machine-readable unsupported capability surfaced by adapter contracts.
      properties:
        feature:
          description: Stable unsupported feature identifier.
          minLength: 1
          title: Feature
          type: string
        reason:
          minLength: 1
          title: Reason
          type: string
        remediation:
          anyOf:
          - minLength: 1
            type: string
          - type: 'null'
          default: null
          title: Remediation
      required:
      - feature
      - reason
      title: AdapterUnsupportedFeature
      type: object
    AdapterConfigEnvelope.61b280c:
      discriminator:
        mapping:
          broadstreet: '#/components/schemas/AdapterConfigEnvelope.61b280c.BroadstreetAdapterConfig'
          freewheel: '#/components/schemas/AdapterConfigEnvelope.61b280c.FreeWheelAdapterConfig'
          google_ad_manager: '#/components/schemas/AdapterConfigEnvelope.61b280c.GAMAdapterConfig'
          mock: '#/components/schemas/AdapterConfigEnvelope.61b280c.MockAdapterConfig'
          springserve: '#/components/schemas/AdapterConfigEnvelope.61b280c.SpringServeAdapterConfig'
        propertyName: type
      oneOf:
      - $ref: '#/components/schemas/AdapterConfigEnvelope.61b280c.GAMAdapterConfig'
      - $ref: '#/components/schemas/AdapterConfigEnvelope.61b280c.MockAdapterConfig'
      - $ref: '#/components/schemas/AdapterConfigEnvelope.61b280c.FreeWheelAdapterConfig'
      - $ref: '#/components/schemas/AdapterConfigEnvelope.61b280c.BroadstreetAdapterConfig'
      - $ref: '#/components/schemas/AdapterConfigEnvelope.61b280c.SpringServeAdapterConfig'
      title: AdapterConfigEnvelope
    AdapterConfigEnvelope.61b280c.BroadstreetAdapterConfig:
      additionalProperties: false
      description: Broadstreet adapter configuration.
      properties:
        api_key:
          format: password
          title: Api Key
          type: string
          writeOnly: true
        campaign_name_template:
          default: AdCP-{po_number}-{product_name}
          maxLength: 500
          title: Campaign Name Template
          type: string
        default_advertiser_id:
          anyOf:
          - maxLength: 64
            type: string
          - type: 'null'
          default: null
          title: Default Advertiser Id
        network_id:
          maxLength: 64
          minLength: 1
          title: Network Id
          type: string
        type:
          const: broadstreet
          default: broadstreet
          title: Type
          type: string
      required:
      - network_id
      - api_key
      title: BroadstreetAdapterConfig
      type: object
    AdapterConfigEnvelope.61b280c.FreeWheelAdapterConfig:
      additionalProperties: false
      description: "FreeWheel Publisher API adapter configuration.\n\nExactly one\
        \ auth path is required: ``username`` + ``password`` (OAuth2\npassword grant\
        \ \u2014 the canonical path, auto-refreshing) or ``api_token``\n(pre-minted\
        \ bearer, escape hatch for partner-provisioned tokens)."
      properties:
        api_token:
          anyOf:
          - format: password
            type: string
            writeOnly: true
          - type: 'null'
          default: null
          title: Api Token
        default_advertiser_id:
          anyOf:
          - maxLength: 64
            type: string
          - type: 'null'
          default: null
          title: Default Advertiser Id
        environment:
          default: production
          enum:
          - production
          - staging
          title: Environment
          type: string
        password:
          anyOf:
          - format: password
            type: string
            writeOnly: true
          - type: 'null'
          default: null
          title: Password
        type:
          const: freewheel
          default: freewheel
          title: Type
          type: string
        username:
          anyOf:
          - maxLength: 255
            type: string
          - type: 'null'
          default: null
          title: Username
      title: FreeWheelAdapterConfig
      type: object
    AdapterConfigEnvelope.61b280c.GAMAdapterConfig:
      additionalProperties: false
      description: Google Ad Manager adapter configuration.
      properties:
        network_code:
          maxLength: 32
          minLength: 1
          title: Network Code
          type: string
        refresh_token:
          anyOf:
          - format: password
            type: string
            writeOnly: true
          - type: 'null'
          default: null
          title: Refresh Token
        service_account_email:
          maxLength: 255
          minLength: 3
          title: Service Account Email
          type: string
        service_account_key_json:
          format: password
          title: Service Account Key Json
          type: string
          writeOnly: true
        type:
          const: google_ad_manager
          default: google_ad_manager
          title: Type
          type: string
      required:
      - network_code
      - service_account_email
      - service_account_key_json
      title: GAMAdapterConfig
      type: object
    AdapterConfigEnvelope.61b280c.MockAdapterConfig:
      additionalProperties: false
      description: Mock adapter configuration (no real backend).
      properties:
        dry_run:
          default: false
          title: Dry Run
          type: boolean
        type:
          const: mock
          default: mock
          title: Type
          type: string
      title: MockAdapterConfig
      type: object
    AdapterConfigEnvelope.61b280c.SpringServeAdapterConfig:
      additionalProperties: false
      description: 'SpringServe (Magnite) ad-server adapter configuration.


        Exactly one auth path is required: ``email`` + ``password`` (the

        canonical path -- the SpringServe API mints a 2-hour token from

        these credentials and the adapter caches + refreshes) or

        ``api_token`` (a pre-minted token, escape hatch for partner-

        provisioned tokens; no auto-refresh).'
      properties:
        api_token:
          anyOf:
          - format: password
            type: string
            writeOnly: true
          - type: 'null'
          default: null
          title: Api Token
        default_demand_partner_id:
          anyOf:
          - type: integer
          - type: 'null'
          default: null
          title: Default Demand Partner Id
        demand_class:
          default: line_item
          enum:
          - line_item
          - tag
          title: Demand Class
          type: string
        email:
          anyOf:
          - maxLength: 255
            type: string
          - type: 'null'
          default: null
          title: Email
        enable_key_value_targeting:
          default: false
          title: Enable Key Value Targeting
          type: boolean
        environment:
          const: production
          default: production
          title: Environment
          type: string
        password:
          anyOf:
          - format: password
            type: string
            writeOnly: true
          - type: 'null'
          default: null
          title: Password
        rate_currency:
          default: USD
          maxLength: 3
          minLength: 3
          pattern: ^[A-Z]{3}$
          title: Rate Currency
          type: string
        type:
          const: springserve
          default: springserve
          title: Type
          type: string
      title: SpringServeAdapterConfig
      type: object
    AdapterConfigResponse.f44f287:
      additionalProperties: false
      description: Adapter config view returned with secrets redacted.
      properties:
        configured:
          title: Configured
          type: boolean
        network_code:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Network Code
        refresh_token:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Refresh Token
        service_account_email:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Service Account Email
        service_account_key_json:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Service Account Key Json
        type:
          title: Type
          type: string
      required:
      - type
      - configured
      title: AdapterConfigResponse
      type: object
    AdapterSettingsSchemaResponse.f44f287:
      additionalProperties: false
      description: Runtime adapter settings schema with template-macro metadata.
      properties:
        schema:
          additionalProperties: true
          title: Schema
          type: object
        template_macros:
          additionalProperties:
            items:
              $ref: '#/components/schemas/AdapterSettingsSchemaResponse.f44f287.TemplateMacro'
            type: array
          title: Template Macros
          type: object
        type:
          title: Type
          type: string
      required:
      - type
      - schema
      title: AdapterSettingsSchemaResponse
      type: object
    AdapterSettingsSchemaResponse.f44f287.TemplateMacro:
      additionalProperties: false
      description: One supported naming-template macro.
      properties:
        description:
          title: Description
          type: string
        name:
          title: Name
          type: string
      required:
      - name
      - description
      title: TemplateMacro
      type: object
    AdapterSettingsValidationResponse.f44f287:
      additionalProperties: false
      description: Validation result for adapter runtime settings.
      properties:
        errors:
          items:
            $ref: '#/components/schemas/AdapterSettingsValidationResponse.f44f287.AdapterSettingsValidationError'
          title: Errors
          type: array
        preview:
          additionalProperties:
            type: string
          title: Preview
          type: object
        valid:
          title: Valid
          type: boolean
      required:
      - valid
      title: AdapterSettingsValidationResponse
      type: object
    AdapterSettingsValidationResponse.f44f287.AdapterSettingsValidationError:
      additionalProperties: false
      description: One validation error for adapter runtime settings.
      properties:
        field:
          title: Field
          type: string
        message:
          title: Message
          type: string
      required:
      - field
      - message
      title: AdapterSettingsValidationError
      type: object
    ApiError.f44f287:
      additionalProperties: false
      description: Standard problem-detail shape used by every Tenant Management endpoint.
      properties:
        details:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          default: null
          title: Details
        error:
          title: Error
          type: string
        message:
          title: Message
          type: string
      required:
      - error
      - message
      title: ApiError
      type: object
    ApproveWorkflowRequest.f44f287:
      additionalProperties: false
      description: '``POST /workflows/{wid}/approve`` body. Notes are optional on
        approve.'
      properties:
        notes:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Notes
      title: ApproveWorkflowRequest
      type: object
    BroadstreetSettings.f44f287:
      additionalProperties: false
      description: Broadstreet runtime settings that affect how buys are materialized.
      properties:
        campaign_name_template:
          default: AdCP-{po_number}-{product_name}
          description: Template used for Broadstreet campaign names. Uses {macro}
            syntax.
          maxLength: 500
          title: Campaign Name Template
          type: string
          x-supported-macros:
          - description: PO number from the media-buy request, or unknown.
            name: po_number
          - description: Name of the first product in the media buy.
            name: product_name
          - description: Principal/advertiser display name.
            name: advertiser_name
          - description: UTC timestamp in YYYYMMDD_HHMMSS format.
            name: timestamp
        default_advertiser_id:
          anyOf:
          - maxLength: 64
            type: string
          - type: 'null'
          default: null
          description: Fallback Broadstreet advertiser ID for principals without an
            explicit Broadstreet mapping.
          title: Default Advertiser Id
        type:
          const: broadstreet
          default: broadstreet
          title: Type
          type: string
      title: BroadstreetSettings
      type: object
    BuyerAdvertiserMapping.f44f287:
      additionalProperties: false
      description: "Routing rule on the wire \u2014 the public face of an\n``AdvertiserRoutingRule``\
        \ ORM row.\n\nVocabulary alignment with Scope3 Storefront UI: external surface\
        \ uses\n\"buyer-advertiser-mapping\"; internal storage table is named\n``advertiser_routing_rules``\
        \ because the impl IS a precedence-ordered\nrouting chain. One-line mapping\
        \ at the API boundary."
      properties:
        brand_house:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Brand House
        brand_id:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Brand Id
        created_at:
          format: date-time
          title: Created At
          type: string
        gam_advertiser_id:
          title: Gam Advertiser Id
          type: string
        id:
          title: Id
          type: string
        operator_domain:
          title: Operator Domain
          type: string
        principal_id:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Principal Id
        updated_at:
          format: date-time
          title: Updated At
          type: string
      required:
      - id
      - operator_domain
      - gam_advertiser_id
      - created_at
      - updated_at
      title: BuyerAdvertiserMapping
      type: object
    CreateAccountRequest.f44f287:
      additionalProperties: false
      description: "Pre-map a GAM advertiser to a billing key.\n\nUpserts by the same\
        \ natural key ``_sync_accounts_impl`` uses so the\nnext ``sync_accounts``\
        \ call from a buyer agent finds the row already\nwired and skips ``pending_provision``\
        \ entirely.\n\nValidation:\n- ``billing=agent`` requires ``buyer_agent_principal_id``.\n\
        - ``sandbox=True`` rejects ``gam_advertiser_id`` \u2014 sandbox routes to\n\
        \  the per-tenant sandbox advertiser, not a caller-specified one."
      properties:
        billing:
          enum:
          - operator
          - agent
          title: Billing
          type: string
        brand:
          $ref: '#/components/schemas/CreateAccountRequest.f44f287.BrandRef'
        buyer_agent_principal_id:
          anyOf:
          - maxLength: 100
            type: string
          - type: 'null'
          default: null
          title: Buyer Agent Principal Id
        gam_advertiser_id:
          anyOf:
          - maxLength: 64
            type: string
          - type: 'null'
          default: null
          title: Gam Advertiser Id
        gam_advertiser_name:
          anyOf:
          - maxLength: 255
            type: string
          - type: 'null'
          default: null
          title: Gam Advertiser Name
        name:
          anyOf:
          - maxLength: 255
            type: string
          - type: 'null'
          default: null
          title: Name
        operator:
          maxLength: 255
          minLength: 1
          title: Operator
          type: string
        payment_terms:
          anyOf:
          - enum:
            - net_15
            - net_30
            - net_45
            - net_60
            - net_90
            - prepay
            type: string
          - type: 'null'
          default: null
          title: Payment Terms
        rate_card:
          anyOf:
          - maxLength: 255
            type: string
          - type: 'null'
          default: null
          title: Rate Card
        sandbox:
          default: false
          title: Sandbox
          type: boolean
      required:
      - operator
      - brand
      - billing
      title: CreateAccountRequest
      type: object
    CreateAccountRequest.f44f287.BrandRef:
      additionalProperties: false
      description: "Compact brand reference. Mirrors AdCP ``BrandReference`` minimally\
        \ \u2014\n``domain`` is the natural-key field; ``brand_id`` is an optional\n\
        publisher-side stable id when one brand owns multiple domains."
      properties:
        brand_id:
          anyOf:
          - maxLength: 255
            type: string
          - type: 'null'
          default: null
          title: Brand Id
        domain:
          maxLength: 255
          minLength: 1
          title: Domain
          type: string
      required:
      - domain
      title: BrandRef
      type: object
    CreateBuyerAdvertiserMappingRequest.f44f287:
      additionalProperties: false
      description: '``POST /tenants/{tid}/buyer-advertiser-mappings`` body.'
      properties:
        brand_house:
          anyOf:
          - maxLength: 255
            type: string
          - type: 'null'
          default: null
          title: Brand House
        brand_id:
          anyOf:
          - maxLength: 255
            type: string
          - type: 'null'
          default: null
          title: Brand Id
        gam_advertiser_id:
          maxLength: 64
          minLength: 1
          title: Gam Advertiser Id
          type: string
        operator_domain:
          maxLength: 255
          minLength: 1
          title: Operator Domain
          type: string
        principal_id:
          anyOf:
          - maxLength: 50
            type: string
          - type: 'null'
          default: null
          title: Principal Id
      required:
      - operator_domain
      - gam_advertiser_id
      title: CreateBuyerAdvertiserMappingRequest
      type: object
    CreateWebhookSubscriptionRequest.f44f287:
      additionalProperties: false
      description: '``POST /tenants/{tid}/webhooks`` body.


        ``event_types``: subset of :data:`WEBHOOK_EVENT_TYPES`; empty list means

        "all events". ``secret`` may be omitted, in which case the server

        generates one and returns it in the create response (exactly once).'
      properties:
        description:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Description
        event_types:
          items:
            enum:
            - workflow.created
            - workflow.decided
            - media_buy.created
            - media_buy.status_changed
            - creative.created
            - creative.status_changed
            - principal.created
            - product.created
            - product.updated
            - product.priced
            - product.removed
            - signal.created
            - signal.updated
            - signal.priced
            - signal.removed
            - wholesale_feed.bulk_change
            - sync_run.completed
            - sync_run.failed
            - sync_health.changed
            - tenant.config_changed
            type: string
          title: Event Types
          type: array
        extra_headers:
          anyOf:
          - additionalProperties:
              type: string
            type: object
          - type: 'null'
          default: null
          title: Extra Headers
        secret:
          anyOf:
          - minLength: 32
            type: string
          - type: 'null'
          default: null
          title: Secret
        url:
          minLength: 1
          title: Url
          type: string
      required:
      - url
      title: CreateWebhookSubscriptionRequest
      type: object
    DeleteSignalMappingResponse.f44f287:
      additionalProperties: false
      description: Delete response for signal mappings.
      properties:
        message:
          title: Message
          type: string
        success:
          title: Success
          type: boolean
      required:
      - success
      - message
      title: DeleteSignalMappingResponse
      type: object
    DeleteWholesaleProductResponse.f44f287:
      additionalProperties: false
      description: Delete response for wholesale products.
      properties:
        message:
          title: Message
          type: string
        success:
          title: Success
          type: boolean
      required:
      - success
      - message
      title: DeleteWholesaleProductResponse
      type: object
    EnsureGamAdvertiserRequest.f44f287:
      additionalProperties: false
      description: '``POST /tenants/{tid}/gam/advertisers:ensure`` body.'
      properties:
        dry_run:
          default: false
          title: Dry Run
          type: boolean
        name:
          maxLength: 255
          minLength: 1
          title: Name
          type: string
      required:
      - name
      title: EnsureGamAdvertiserRequest
      type: object
    EnsureGamAdvertiserResponse.f44f287:
      additionalProperties: false
      description: 'Idempotent advertiser ensure response.


        ``created`` is true only when the endpoint actually created a GAM company.

        If the advertiser already existed in cache or GAM, ``created`` is false.'
      properties:
        advertiser:
          $ref: '#/components/schemas/EnsureGamAdvertiserResponse.f44f287.GamAdvertiser'
        created:
          title: Created
          type: boolean
        dry_run:
          default: false
          title: Dry Run
          type: boolean
      required:
      - advertiser
      - created
      title: EnsureGamAdvertiserResponse
      type: object
    EnsureGamAdvertiserResponse.f44f287.GamAdvertiser:
      additionalProperties: false
      description: 'One row from the synced ``gam_advertisers`` cache, on the wire.


        Source of truth is GAM''s ``CompanyService.getCompaniesByStatement

        WHERE type = ''ADVERTISER''``; this projection is what the Buyer

        Routing UI''s picker renders.'
      properties:
        currency_code:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Currency Code
        id:
          title: Id
          type: string
        name:
          title: Name
          type: string
        status:
          title: Status
          type: string
      required:
      - id
      - name
      - status
      title: GamAdvertiser
      type: object
    FreeWheelSettings.f44f287:
      additionalProperties: false
