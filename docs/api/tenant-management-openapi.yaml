          default: sync_already_running
          title: Error
          type: string
        message:
          title: Message
          type: string
        running_sync_types:
          items:
            type: string
          title: Running Sync Types
          type: array
        started_at:
          format: date-time
          title: Started At
          type: string
        sync_run_ids:
          additionalProperties:
            type: string
          title: Sync Run Ids
          type: object
      required:
      - message
      - started_at
      title: RefreshConflictResponse
      type: object
    RefreshResponse.f44f287:
      additionalProperties: false
      description: "``POST /tenants/{tid}/refresh`` response (HTTP 202) \u2014 fan-out\
        \ of sync run ids.\n\nStorefront reads ``GET /tenants/{tid}/status`` (``syncs``\
        \ block) for\nprogress per sync type. Re-POST within 60 seconds returns the\
        \ SAME\nids (idempotent \u2014 avoids hammering GAM when a publisher mashes\
        \ the\nbutton)."
      properties:
        started_at:
          format: date-time
          title: Started At
          type: string
