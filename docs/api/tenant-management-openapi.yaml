  /api/v1/tenant-management/tenants/{tenant_id}/refresh:
    post:
      description: "For each enabled sync type, either reuse the existing SyncJob\
        \ if one started in the last 60 seconds (or is currently running), or create\
        \ a new pending SyncJob. The actual sync work is picked up by the existing\
        \ background sync infrastructure.\n\nReturns 202 Accepted with ``sync_run_ids``\
        \ mapping sync_type \u2192 sync_id. Storefront reads ``GET /tenants/{tid}/status``\
        \ (``syncs`` block) for per-type progress.\n\nReturns 409 ``sync_already_running``\
        \ when at least one sync_type has a ``running`` row that started *before*\
        \ the 60s idempotency window \u2014 i.e. a long-running in-flight sync that\
        \ the caller's retry would just shadow. The 409 body shape mirrors the 202\
        \ body (``sync_run_ids`` + ``started_at`` at the top level) plus the ``error``,\
        \ ``message``, and ``running_sync_types`` fields \u2014 so receivers don't\
        \ need a second parse path. Issue #463: a UI \"Retry\" button needs a clear\
        \ signal that the click triggered nothing new instead of an indistinguishable\
        \ 202."
      operationId: post__api_v1_tenant-management_tenants_{tenant_id}_refresh
      parameters:
      - description: ''
        in: path
        name: tenant_id
        required: true
        schema:
          type: string
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse.f44f287'
          description: Accepted
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError.f44f287'
          description: Not Found
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshConflictResponse.f44f287'
          description: Conflict
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError.6a07bef'
          description: Unprocessable Content
      summary: "Fan out a refresh across all sync types \u2014 collapses N per-sync\
        \ triggers into one call."
      tags: []
