    BuyerAdvertiserMapping.f44f287:
      additionalProperties: false
      description: "Routing rule on the wire \u2014 the public face of an\n``AdvertiserRoutingRule``\
        \ ORM row.\n\nVocabulary alignment with Scope3 Storefront UI: external surface\
        \ uses\n\"buyer-advertiser-mapping\"; internal storage table is named\n``advertiser_routing_rules``\
        \ because the impl IS a precedence-ordered\nrouting chain. One-line mapping\
        \ at the API boundary."
      properties:
        brand_house:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Brand House
        brand_id:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Brand Id
        created_at:
          format: date-time
          title: Created At
          type: string
        gam_advertiser_id:
          title: Gam Advertiser Id
          type: string
        id:
          title: Id
          type: string
        operator_domain:
          title: Operator Domain
          type: string
        principal_id:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Principal Id
        updated_at:
          format: date-time
          title: Updated At
          type: string
      required:
      - id
      - operator_domain
      - gam_advertiser_id
      - created_at
      - updated_at
      title: BuyerAdvertiserMapping
      type: object
    CreateAccountRequest.f44f287:
      additionalProperties: false
      description: "Pre-map a GAM advertiser to a billing key.\n\nUpserts by the same\
        \ natural key ``_sync_accounts_impl`` uses so the\nnext ``sync_accounts``\
        \ call from a buyer agent finds the row already\nwired and skips ``pending_provision``\
        \ entirely.\n\nValidation:\n- ``billing=agent`` requires ``buyer_agent_principal_id``.\n\
        - ``sandbox=True`` rejects ``gam_advertiser_id`` \u2014 sandbox routes to\n\
        \  the per-tenant sandbox advertiser, not a caller-specified one."
      properties:
        billing:
          enum:
          - operator
          - agent
          title: Billing
          type: string
        brand:
          $ref: '#/components/schemas/CreateAccountRequest.f44f287.BrandRef'
        buyer_agent_principal_id:
          anyOf:
          - maxLength: 100
            type: string
          - type: 'null'
          default: null
          title: Buyer Agent Principal Id
        gam_advertiser_id:
          anyOf:
          - maxLength: 64
            type: string
          - type: 'null'
          default: null
          title: Gam Advertiser Id
        gam_advertiser_name:
          anyOf:
          - maxLength: 255
            type: string
          - type: 'null'
          default: null
          title: Gam Advertiser Name
        name:
          anyOf:
          - maxLength: 255
            type: string
          - type: 'null'
          default: null
          title: Name
        operator:
          maxLength: 255
          minLength: 1
          title: Operator
          type: string
        payment_terms:
          anyOf:
          - enum:
            - net_15
            - net_30
            - net_45
            - net_60
            - net_90
            - prepay
            type: string
          - type: 'null'
          default: null
          title: Payment Terms
        rate_card:
          anyOf:
          - maxLength: 255
            type: string
          - type: 'null'
          default: null
          title: Rate Card
        sandbox:
          default: false
          title: Sandbox
          type: boolean
      required:
      - operator
      - brand
      - billing
      title: CreateAccountRequest
      type: object
    CreateAccountRequest.f44f287.BrandRef:
      additionalProperties: false
      description: "Compact brand reference. Mirrors AdCP ``BrandReference`` minimally\
        \ \u2014\n``domain`` is the natural-key field; ``brand_id`` is an optional\n\
        publisher-side stable id when one brand owns multiple domains."
      properties:
        brand_id:
          anyOf:
          - maxLength: 255
            type: string
          - type: 'null'
          default: null
          title: Brand Id
        domain:
          maxLength: 255
          minLength: 1
          title: Domain
          type: string
      required:
      - domain
      title: BrandRef
      type: object
    CreateBuyerAdvertiserMappingRequest.f44f287:
