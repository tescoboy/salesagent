        advertisers:
          items:
            $ref: '#/components/schemas/ListGamAdvertisersResponse.f44f287.GamAdvertiser'
          title: Advertisers
          type: array
        next_cursor:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Next Cursor
        synced_at:
          anyOf:
          - format: date-time
