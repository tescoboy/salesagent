      required:
      - label
      - url
      title: EmbedBreadcrumbRoot
      type: object
    TenantStatusResponse.f44f287:
      additionalProperties: false
      description: "``GET /tenants/{tid}/status`` \u2014 one round-trip operational\
        \ snapshot."
      properties:
        adapter:
          $ref: '#/components/schemas/TenantStatusResponse.f44f287.StatusAdapterBlock'
        creatives:
