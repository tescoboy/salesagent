# Nginx config for Docker Compose development (path-based routing)
# Uses Docker service names (adcp-server) for container-to-container routing
# Mounted by docker-compose.yml into the nginx proxy container
# For production deployment, use nginx-single-tenant.conf or nginx-multi-tenant.conf

user www-data;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # WebSocket connection upgrade: non-WS requests get "close"
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    server {
        listen 8000;
        server_name _;

        # Use Docker's internal DNS resolver for dynamic upstream resolution
        # This allows nginx to start before upstreams are available
        resolver 127.0.0.11 valid=30s ipv6=off;

        # Define upstream variable (resolved at request time, not config load)
        # All services run in a single FastAPI process on adcp-server:8080
        set $adcp_server "adcp-server:8080";

        # Health check — proxy to upstream so it reflects actual app readiness
        location /health {
            access_log off;
            proxy_pass http://$adcp_server$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
        }

        # Root — exact match to proxy without trailing path
        location = / {
            proxy_pass http://$adcp_server/;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Catch-all — every other path proxied to the single upstream
        # WebSocket, auth, and standard proxy headers included for all requests;
        # harmless on non-WebSocket/non-auth endpoints (empty values passed through)
        location / {
            proxy_pass http://$adcp_server$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header x-adcp-auth $http_x_adcp_auth;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
