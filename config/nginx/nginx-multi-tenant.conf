# Nginx config for multi-tenant production deployment (subdomain routing)
# Used by run_all_services.py for Fly.io, Cloud Run, etc. when ADCP_MULTI_TENANT=true
# For single-tenant (path-based only), use nginx-single-tenant.conf
# For Docker Compose development, use nginx-development.conf
#
# TEMPLATE: This file uses ${SALES_AGENT_DOMAIN} which is substituted at runtime
# by run_all_services.py using envsubst. Set this environment variable before starting.
# Example: SALES_AGENT_DOMAIN=sales-agent.example.com

user www-data;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Map the original client protocol to use as X-Forwarded-Proto
    # Fly.io sets both X-Forwarded-Proto and Fly-Forwarded-Proto with the original client protocol
    # We must use the incoming value, NOT $scheme (which is http since nginx sees internal traffic)
    # Priority: Fly-Forwarded-Proto > X-Forwarded-Proto > $scheme
    map $http_fly_forwarded_proto $fly_proto {
        default "";
        https   https;
        http    http;
    }
    map $http_x_forwarded_proto $incoming_proto {
        default $scheme;
        https   https;
        http    http;
    }
    # Use Fly-Forwarded-Proto if set, otherwise use X-Forwarded-Proto from upstream, otherwise $scheme
    map $fly_proto $forwarded_proto {
        default $incoming_proto;
        https   https;
        http    http;
    }

    # Extract tenant subdomain from host header
    # For host "tenant.sales-agent.example.com", extracts "tenant"
    #
    # NOTE: This uses a map directive instead of a regex server_name because
    # nginx regex patterns can't use envsubst variables. A hardcoded version
    # would use: server_name ~^(?<tenant>[^.]+)\.your-domain\.com$;
    # This map achieves the same result - it extracts the first subdomain from
    # any host. Since the server blocks only match *.${SALES_AGENT_DOMAIN},
    # the extracted tenant is always correct for that server block.
    map $host $tenant {
        default "";
        ~^(?<subdomain>[^.]+)\. $subdomain;
    }

    # WebSocket connection upgrade: non-WS requests get "close"
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml application/atom+xml image/svg+xml;

    # Upstream server (all services in single FastAPI process)
    upstream mcp_server {
        server localhost:8080;
    }

    # ─── Admin subdomain server ───────────────────────────────────────
    server {
        listen 0.0.0.0:8000;
        server_name admin.${SALES_AGENT_DOMAIN};

        # Health check — proxy to upstream so it reflects actual app readiness
        location /health {
            access_log off;
            proxy_pass http://mcp_server/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Root redirects to admin index
        location = / {
            proxy_pass http://mcp_server/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Prefix /admin;
        }

        # All admin routes — X-Forwarded-Prefix tells CustomProxyFix this is /admin
        location / {
            proxy_pass http://mcp_server;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Prefix /admin;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # ─── Tenant-specific subdomain routing ────────────────────────────
    # Uses wildcard matching for tenant subdomains (tenant extracted via map $host $tenant above)
    server {
        listen 0.0.0.0:8000;
        server_name *.${SALES_AGENT_DOMAIN};  # Wildcard + map replaces regex capture

        # Health check — proxy to upstream so it reflects actual app readiness
        location /health {
            access_log off;
            proxy_pass http://mcp_server/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Admin UI with X-Forwarded-Prefix (no tenant header — admin gets tenant from session)
        location /admin/ {
            proxy_pass http://mcp_server/admin/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Prefix /admin;
            proxy_cache_bypass $http_upgrade;
        }

        location = /admin {
            return 301 $scheme://$host/admin/;
        }

        # Root serves tenant landing page
        location = / {
            proxy_pass http://mcp_server/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header x-adcp-tenant $tenant;
            proxy_set_header Apx-Incoming-Host $tenant.${SALES_AGENT_DOMAIN};
            proxy_cache_bypass $http_upgrade;
        }

        # Catch-all — proxies with tenant header for all other paths
        location / {
            proxy_pass http://mcp_server;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header x-adcp-auth $http_x_adcp_auth;
            proxy_set_header x-adcp-tenant $tenant;
            proxy_set_header Apx-Incoming-Host $tenant.${SALES_AGENT_DOMAIN};
            proxy_cache_bypass $http_upgrade;
        }
    }

    # ─── Base domain server ───────────────────────────────────────────
    server {
        listen 0.0.0.0:8000;
        server_name ${SALES_AGENT_DOMAIN};

        # Health check — proxy to upstream so it reflects actual app readiness
        location /health {
            access_log off;
            proxy_pass http://mcp_server/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Root serves signup page
        location = / {
            proxy_pass http://mcp_server/signup;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
        }

        # Catch-all — proxies everything else to the single upstream
        location / {
            proxy_pass http://mcp_server;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header x-adcp-auth $http_x_adcp_auth;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # ─── Default fallback server ──────────────────────────────────────
    server {
        listen 0.0.0.0:8000 default_server;
        server_name _;

        # Health check — proxy to upstream so it reflects actual app readiness
        location /health {
            access_log off;
            proxy_pass http://mcp_server/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Admin UI with X-Forwarded-Prefix
        location /admin/ {
            proxy_pass http://mcp_server/admin/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Prefix /admin;
            proxy_cache_bypass $http_upgrade;
        }

        location = /admin {
            return 301 /admin/;
        }

        # Root serves landing page (for custom domains via Approximated)
        # If Apx-Incoming-Host is set, route to app which handles virtual host lookups
        # Otherwise redirect to /admin for direct Fly.io access
        location = / {
            proxy_pass http://mcp_server/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            # Pass through Approximated headers for virtual host lookup
            proxy_set_header Apx-Incoming-Host $http_apx_incoming_host;
        }

        # Catch-all — proxies everything else to the single upstream
        location / {
            proxy_pass http://mcp_server;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header x-adcp-auth $http_x_adcp_auth;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
