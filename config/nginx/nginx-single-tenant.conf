# Nginx config for single-tenant production deployment (path-based routing)
# Used by run_all_services.py for Fly.io, Cloud Run, etc.
# For multi-tenant subdomain routing, use nginx-multi-tenant.conf
# For Docker Compose development, use nginx-development.conf

user www-data;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Map the original client protocol to use as X-Forwarded-Proto
    # Fly.io sets both X-Forwarded-Proto and Fly-Forwarded-Proto with the original client protocol
    # We must use the incoming value, NOT $scheme (which is http since nginx sees internal traffic)
    # Priority: Fly-Forwarded-Proto > X-Forwarded-Proto > $scheme
    map $http_fly_forwarded_proto $fly_proto {
        default "";
        https   https;
        http    http;
    }
    map $http_x_forwarded_proto $incoming_proto {
        default $scheme;
        https   https;
        http    http;
    }
    # Use Fly-Forwarded-Proto if set, otherwise use X-Forwarded-Proto from upstream, otherwise $scheme
    map $fly_proto $forwarded_proto {
        default $incoming_proto;
        https   https;
        http    http;
    }

    # WebSocket connection upgrade: non-WS requests get "close"
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    server {
        listen 8000;
        server_name _;

        # Health check — proxy to upstream so it reflects actual app readiness
        location /health {
            access_log off;
            proxy_pass http://localhost:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
        }

        # Root — exact match to proxy without trailing path
        location = / {
            proxy_pass http://localhost:8080/;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
        }

        # Catch-all — every other path proxied to the single upstream
        # WebSocket, auth, and standard proxy headers included for all requests;
        # harmless on non-WebSocket/non-auth endpoints (empty values passed through)
        location / {
            proxy_pass http://localhost:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header x-adcp-auth $http_x_adcp_auth;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
