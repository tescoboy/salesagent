name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main , develop ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'
  UV_VERSION: '0.11.6'

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: ${{ env.UV_VERSION }}

    - name: Scan for vulnerabilities
      # GHSA-5239-wwwm-4pmq: Pygments ReDoS in AdlLexer (CVE-2026-4539) - no fix available;
      #   local-access-only (AV:L, CVSS 3.3); ADL lexer not invoked by this application
      run: uvx uv-secure --ignore-vulns GHSA-5239-wwwm-4pmq

  smoke-tests:
    name: Smoke Tests (Fast Import Checks)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: ${{ env.UV_VERSION }}

    - name: Cache uv dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/uv
          .venv
        key: ${{ runner.os }}-uv-v2-${{ hashFiles('**/uv.lock') }}

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Run smoke tests
      env:
        GEMINI_API_KEY: test_key
        PYTEST_CURRENT_TEST: true
        ADCP_TESTING: true
      run: uv run pytest tests/smoke/ -v --tb=short

    - name: Check for skipped tests
      run: |
        if grep -r "@pytest.mark.skip" tests/ --include="test_*.py" | grep -v "skip_ci"; then
          echo "❌ Found skip decorators in tests!"
          exit 1
        fi
        echo "✅ No skip decorators found"

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: ${{ env.UV_VERSION }}

    - name: Cache uv dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/uv
          .venv
        key: ${{ runner.os }}-uv-v2-${{ hashFiles('**/uv.lock') }}

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Run unit tests
      env:
        GEMINI_API_KEY: test_key_for_mocking
        GOOGLE_CLIENT_ID: test_client_id
        GOOGLE_CLIENT_SECRET: test_client_secret
        SUPER_ADMIN_EMAILS: test@example.com
        ADCP_TESTING: true
      run: uv run pytest tests/unit/ -v --tb=short --cov=. --cov-report=term-missing

  integration-tests:
    name: Integration (${{ matrix.group }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - group: creative
            marker: creative
          - group: product
            marker: product
          - group: media-buy
            marker: media_buy or delivery
          - group: infra
            marker: transport or auth or adapter or schema or admin or infra or inventory or targeting or workflow or policy or agent
          - group: other
            marker: not (creative or product or media_buy or delivery or transport or auth or adapter or schema or admin or infra or inventory or targeting or workflow or policy or agent)

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: adcp_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: adcp_test
        options: >-
          --health-cmd "pg_isready -U adcp_user"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: ${{ env.UV_VERSION }}

    - name: Cache uv dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/uv
          .venv
        key: ${{ runner.os }}-uv-v2-${{ hashFiles('**/uv.lock') }}

    - name: Install dependencies
      run: |
        uv sync --extra dev
        find . -type d -name __pycache__ -exec rm -rf {} + || true
        find . -type f -name '*.pyc' -delete || true

    - name: Run database migrations
      env:
        DATABASE_URL: postgresql://adcp_user:test_password@localhost:5432/adcp_test
      run: uv run python scripts/ops/migrate.py

    - name: Start reference creative agent
      if: matrix.group == 'creative'
      run: |
        # Build the adcp server (includes the reference creative agent)
        # Pin to known-good commit — upstream HEAD has broken migrations (community_points FK violation)
        mkdir -p /tmp/adcp-server
        curl -sL https://github.com/adcontextprotocol/adcp/archive/ca70dd1e2a6c.tar.gz | tar xz -C /tmp/adcp-server --strip-components=1
        docker build -t adcp-creative-agent /tmp/adcp-server

        # The adcp monolith needs its own Postgres — creative agent is one route in the full app
        docker network create creative-net

        docker run -d --network creative-net --name adcp-postgres \
          -e POSTGRES_DB=adcp_registry \
          -e POSTGRES_USER=adcp \
          -e POSTGRES_PASSWORD=localdev \
          postgres:16
        sleep 5

        docker run -d --network creative-net --name creative-agent \
          -p 9999:8080 \
          -e NODE_ENV=production \
          -e PORT=8080 \
          -e DATABASE_URL=postgresql://adcp:localdev@adcp-postgres:5432/adcp_registry \
          -e RUN_MIGRATIONS=true \
          -e ALLOW_INSECURE_COOKIES=true \
          -e DEV_USER_EMAIL=ci@test.com \
          -e DEV_USER_ID=ci-user \
          -e AGENT_TOKEN_ENCRYPTION_SECRET=local-ci-encryption-key-32chars!! \
          -e WORKOS_API_KEY=sk_test_dummy \
          -e WORKOS_CLIENT_ID=client_dummy \
          adcp-creative-agent

        echo "Waiting for creative agent..."
        for i in $(seq 1 60); do
          if curl -sf http://localhost:9999/api/creative-agent/health > /dev/null 2>&1; then
            echo "Creative agent healthy on :9999"
            break
          fi
          sleep 2
        done
        curl -sf http://localhost:9999/api/creative-agent/health || {
          echo "Creative agent failed to start"; docker logs creative-agent | tail -20; exit 1;
        }

    - name: Run integration tests (${{ matrix.group }})
      env:
        DATABASE_URL: postgresql://adcp_user:test_password@localhost:5432/adcp_test
        GEMINI_API_KEY: test_key_for_mocking
        GOOGLE_CLIENT_ID: test_client_id
        GOOGLE_CLIENT_SECRET: test_client_secret
        SUPER_ADMIN_EMAILS: test@example.com
        ENCRYPTION_KEY: PEg0SNGQyvzi4Nft-ForSzK8AGXyhRtql1MgoUsfUHk=
        ADCP_TESTING: true
        CREATIVE_AGENT_URL: ${{ matrix.group == 'creative' && 'http://localhost:9999/api/creative-agent' || '' }}
      run: |
        uv run pytest tests/integration/ -v --tb=short --timeout=60 \
          -m "(${{ matrix.marker }}) and not requires_server and not skip_ci"

  quickstart-test:
    name: Quickstart Docker Compose Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Test the actual quickstart flow users follow

    steps:
    - uses: actions/checkout@v4

    - name: Start services with docker compose
      run: |
        docker compose up -d --wait --wait-timeout 120
        echo "Services started, checking logs..."

    - name: Check db-init completed successfully
      run: |
        # Verify migrations ran
        docker compose logs db-init | grep -E "(migrations completed|Migration complete)" || {
          echo "❌ Migrations did not complete successfully"
          docker compose logs db-init
          exit 1
        }
        echo "✅ Database migrations completed"

    - name: Verify all services are healthy
      run: |
        # Check health endpoints
        curl -f http://localhost:8000/health || {
          echo "❌ Health check failed"
          docker compose logs
          exit 1
        }
        echo "✅ Services are healthy"

    - name: Verify database tables exist
      run: |
        # Connect to postgres and check tables
        docker compose exec -T postgres psql -U adcp_user -d adcp -c "\dt" | grep -E "media_buys|tenants|products" || {
          echo "❌ Required tables not found"
          docker compose exec -T postgres psql -U adcp_user -d adcp -c "\dt"
          exit 1
        }
        echo "✅ Database tables created successfully"

    - name: Cleanup
      if: always()
      run: docker compose down -v

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Run E2E tests on PRs and main branch pushes - catch issues early!
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: ${{ env.UV_VERSION }}

    - name: Cache uv dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/uv
          .venv
        key: ${{ runner.os }}-uv-v2-${{ hashFiles('**/uv.lock') }}

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Verify Docker Compose v2
      run: |
        # GitHub-hosted runners include Docker Compose v2 plugin
        docker compose version
        # Create alias for backwards compatibility with tests that use docker-compose
        echo '#!/bin/bash' | sudo tee /usr/local/bin/docker-compose
        echo 'exec docker compose "$@"' | sudo tee -a /usr/local/bin/docker-compose
        sudo chmod +x /usr/local/bin/docker-compose

    - name: Clean up any lingering containers
      run: |
        # Kill all running containers to prevent port conflicts
        docker ps -q | xargs -r docker kill || true
        # Clean up E2E compose stack specifically
        docker compose -f docker-compose.e2e.yml down -v 2>/dev/null || true
        docker compose down -v 2>/dev/null || true
        # Remove all containers, networks, and volumes
        docker container prune -f 2>/dev/null || true
        docker network prune -f 2>/dev/null || true
        docker volume prune -f 2>/dev/null || true

    - name: Run E2E tests
      env:
        # Docker Compose manages its own PostgreSQL - don't set DATABASE_URL
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'test_key_for_mocking' }}
        GOOGLE_CLIENT_ID: test_client_id
        GOOGLE_CLIENT_SECRET: test_client_secret
        SUPER_ADMIN_EMAILS: test@example.com
        # Don't set ADCP_TESTING=true - let E2E tests manage their own Docker stack
        ADCP_SALES_PORT: 8080
        POSTGRES_PORT: 5435
        # Enable Docker BuildKit for faster builds with caching
        DOCKER_BUILDKIT: 1
        COMPOSE_DOCKER_CLI_BUILD: 1
      run: |
        # Let pytest manage Docker Compose via conftest.py
        # Timeout is 300s (5 min) to allow for Docker build + startup + health checks + test execution
        uv run pytest tests/e2e/ -v --tb=short --timeout=300

    - name: Cleanup Docker services
      if: always()
      run: |
        docker compose -f docker-compose.e2e.yml down -v 2>/dev/null || true
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: ${{ env.UV_VERSION }}

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Run Ruff linter
      run: uv run ruff check . --config pyproject.toml || true
      continue-on-error: true

    - name: Run Ruff formatter
      run: uv run ruff format . --check --config pyproject.toml || true
      continue-on-error: true

    - name: Run mypy type checking (ENFORCED - must pass)
      run: |
        echo "🔍 Running mypy type checks on src/ directory..."
        # Use uv to run mypy from the project's virtual environment
        uv run python -m mypy src/ --config-file=mypy.ini
        echo "✅ Mypy type checking passed (0 errors)"

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [security-audit, smoke-tests, unit-tests, integration-tests, quickstart-test, e2e-tests, lint]
    if: always()

    steps:
    - name: Check test results
      run: |
        if [ "${{ needs.security-audit.result }}" = "failure" ] || [ "${{ needs.unit-tests.result }}" = "failure" ] || [ "${{ needs.integration-tests.result }}" = "failure" ] || [ "${{ needs.quickstart-test.result }}" = "failure" ] || [ "${{ needs.e2e-tests.result }}" = "failure" ] || [ "${{ needs.lint.result }}" = "failure" ]; then
          echo "❌ Tests failed"
          exit 1
        else
          echo "✅ All tests passed (security-audit, smoke, unit, integration x5, quickstart, e2e, lint+mypy)"
        fi
